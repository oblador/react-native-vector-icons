packages:
  - packages/*
  - apps/*
allowBuilds:
  "@evilmartians/lefthook": true
  core-js-pure: true
  nx: true
  unrs-resolver: true
  yo: true
blockExoticSubdeps: true
minimumReleaseAge: 1440
trustPolicy: no-downgrade
trustPolicyExclude:
  - "semver@6.3.1 || 5.7.2" # https://github.com/npm/node-semver/issues/838
  - "react-native-worklets@0.7.2 || 0.7.4"
  - "detect-port@1.6.1" # https://github.com/node-modules/detect-port/issues/64
  - "ua-parser-js@1.0.41"
