pre-commit:
  parallel: true
  commands:
    knip:
      run: pnpm run lint:knip
    biome:
      run: pnpm run lint:biome
    # NOTE: Disabled because it is too slow
    # types:
    #   glob: "*.{json,js,ts,tsx}"
    #   run: npm run lint:types
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: npx commitlint --edit
