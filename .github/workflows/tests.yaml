---
name: Tests

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/tests.yaml"
      - "packages/**"
      - "!packages/directory/**"
      - "!packages/codemod/**"
  pull_request:
    paths:
      - ".github/workflows/tests.yaml"
      - "packages/**"
      - "!packages/directory/**"
      - "!packages/codemod/**"
  workflow_dispatch:

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Android app
        run: ./gradlew app:assembleDebug
        working-directory: packages/icon-explorer/android
      - name: Bundle JS
        run: pnpm run build:android
        working-directory: packages/icon-explorer

  ios:
    name: iOS
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            packages/icon-explorer/ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('packages/icon-explorer/ios/Podfile.lock') }}
      - name: Install pods
        run: pod install || pod install
        working-directory: packages/icon-explorer/ios
        env:
          RCT_USE_PREBUILT_RNCORE: 1
          RCT_USE_RN_DEP: 1
      - name: Build iOS app
        run: xcodebuild -scheme IconExplorer -workspace IconExplorer.xcworkspace ONLY_ACTIVE_ARCH=YES -sdk iphonesimulator -configuration Debug
        working-directory: packages/icon-explorer/ios
      - name: Bundle JS
        run: pnpm run build:ios
        working-directory: packages/icon-explorer
